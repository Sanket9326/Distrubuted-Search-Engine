<div class="flex h-screen flex-col">
  <mat-toolbar color="primary" class="!flex items-center justify-between px-6 shadow-md z-10">
    <div class="flex items-center gap-2 text-lg font-semibold tracking-tight">
      <mat-icon>hub</mat-icon>
      <span>Distributed Search Engine</span>
    </div>
    <nav class="flex gap-1">
      @for (link of navLinks; track link.path) {
        <a
          [routerLink]="link.path"
          routerLinkActive="bg-white/20"
          class="flex items-center gap-1.5 rounded-full px-4 py-1.5 text-sm font-medium transition-colors hover:bg-white/10"
        >
          <mat-icon class="!h-5 !w-5 !text-lg">{{ link.icon }}</mat-icon>
          {{ link.label }}
        </a>
      }
    </nav>
  </mat-toolbar>

  <main class="flex-1 overflow-auto bg-slate-50">
    <router-outlet />
  </main>
</div>
