services:
  postgres:
    image: postgres:16-alpine
    container_name: document-search-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: document-search-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      - postgres

  minio:
    image: minio/minio:latest
    container_name: document-search-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data

  kafka:
    image: apache/kafka:latest
    container_name: document-search-kafka
    restart: unless-stopped
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,INTERNAL://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:${KAFKA_PORT:-9092},INTERNAL://kafka:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  qdrant:
    image: qdrant/qdrant:latest
    container_name: document-search-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant-data:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    container_name: document-search-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama-data:/root/.ollama

  reranker:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9
    container_name: document-search-reranker
    restart: unless-stopped
    command: --model-id ${RERANKER_MODEL:-BAAI/bge-reranker-v2-m3}
    ports:
      - "${RERANKER_PORT:-8082}:80"
    volumes:
      - reranker-data:/data

  upload-service:
    build:
      context: .
      dockerfile: src/Services/UploadService/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      Kafka__BootstrapServers: kafka:29092
      Minio__Endpoint: minio:9000
      Minio__AccessKey: ${MINIO_ROOT_USER}
      Minio__SecretKey: ${MINIO_ROOT_PASSWORD}
      Minio__BucketName: ${MINIO_BUCKET_NAME:-documents}
      Minio__UseSSL: "false"
    ports:
      - "${UPLOAD_SERVICE_PORT:-8080}:8080"
    depends_on:
      - postgres
      - minio
      - kafka

  document-ingestion-service:
    build:
      context: .
      dockerfile: src/Services/DocumentIngestionService/Dockerfile
    restart: unless-stopped
    environment:
      DOTNET_ENVIRONMENT: ${DOTNET_ENVIRONMENT:-Production}
      Kafka__BootstrapServers: kafka:29092
      Kafka__GroupId: document-ingestion-service
      Postgres__ConnectionString: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Minio__Endpoint: minio:9000
      Minio__AccessKey: ${MINIO_ROOT_USER}
      Minio__SecretKey: ${MINIO_ROOT_PASSWORD}
      Minio__BucketName: ${MINIO_BUCKET_NAME:-documents}
      Minio__UseSSL: "false"
    depends_on:
      - postgres
      - minio
      - kafka

  embedding-service:
    build:
      context: .
      dockerfile: src/Services/EmbeddingService/Dockerfile
    restart: unless-stopped
    environment:
      DOTNET_ENVIRONMENT: ${DOTNET_ENVIRONMENT:-Production}
      Kafka__BootstrapServers: kafka:29092
      Kafka__GroupId: embedding-service
      Postgres__ConnectionString: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Qdrant__Endpoint: qdrant
      Qdrant__Port: "6334"
      Qdrant__CollectionName: ${QDRANT_COLLECTION_NAME:-document_chunks}
      Ollama__Endpoint: http://ollama:11434
      Ollama__Model: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
    depends_on:
      - postgres
      - kafka
      - qdrant
      - ollama

  search-service:
    build:
      context: .
      dockerfile: src/Services/SearchService/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      Qdrant__Endpoint: qdrant
      Qdrant__Port: "6334"
      Qdrant__CollectionName: ${QDRANT_COLLECTION_NAME:-document_chunks}
      Ollama__Endpoint: http://ollama:11434
      Ollama__Model: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
      Reranker__Endpoint: http://reranker:80
    ports:
      - "${SEARCH_SERVICE_PORT:-8081}:8080"
    depends_on:
      - qdrant
      - ollama
      - reranker

volumes:
  postgres-data:
  minio-data:
  pgadmin-data:
  qdrant-data:
  ollama-data:
  reranker-data:
