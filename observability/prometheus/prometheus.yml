global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: upload-service
    static_configs:
      - targets: ["upload-service:8080"]

  - job_name: document-ingestion-service
    static_configs:
      - targets: ["document-ingestion-service:8080"]

  - job_name: embedding-service
    static_configs:
      - targets: ["embedding-service:8080"]

  - job_name: search-service
    static_configs:
      - targets: ["search-service:8080"]

  - job_name: reliability-service
    static_configs:
      - targets: ["reliability-service:8080"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
